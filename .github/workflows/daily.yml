name: daily-quota-report
on:
  # GitHub 定时任务是"尽力而为"，高峰期常延迟甚至跳过。这里在 UTC 0 点后尽早排多个
  # 非整点时刻做兜底：哪个槽位没堵就由哪个先跑，跑成功后其余槽位靠判重自动跳过，
  # 等于"在时段内尽早抓到一个能执行的槽位"。仅周一至周五。
  # 注意：槽位不能早过 UTC 00:00，否则跨到前一个 UTC 日，交易日判断与快照日期会错位。
  schedule:
    - cron: "14 0 * * 1-5"   # UTC 00:14 ≈ 北京 08:14（主槽，贴着 0 点又避开正点高峰）
    - cron: "33 0 * * 1-5"   # 北京 08:33 兜底
    - cron: "57 0 * * 1-5"   # 北京 08:57 兜底
    - cron: "21 1 * * 1-5"   # 北京 09:21 兜底
    - cron: "47 1 * * 1-5"   # 北京 09:47 兜底（最后一道）
  workflow_dispatch:          # 手动触发（测试用，跳过交易日与判重检查）

permissions:
  contents: write

# 多个槽位串行执行，避免并发 push 冲突或重复推送
concurrency:
  group: daily-quota
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装中文字体与依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          pip install -r requirements.txt

      - name: 交易日检查 + 判重（已生成则跳过冗余触发）
        id: gate
        run: |
          today=$(date -u +%F)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动触发：强制执行"
            echo "run=1" >> "$GITHUB_OUTPUT"
          elif [ "$(python trading_day.py)" != "1" ]; then
            echo "非交易日，跳过"
            echo "run=0" >> "$GITHUB_OUTPUT"
          else
            # 查"远端最新 master"上今天的快照是否已存在——而非本地 checkout，
            # 因为定时任务 checkout 的是触发时刻的旧 commit，只看本地会漏判、导致重复推。
            git fetch origin "${{ github.ref_name }}" --depth=1 --quiet || true
            if git cat-file -e "origin/${{ github.ref_name }}:data/$today.json" 2>/dev/null; then
              echo "今日 $today 已生成并推送，跳过本次冗余触发"
              echo "run=0" >> "$GITHUB_OUTPUT"
            else
              echo "run=1" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: 抓取并生成卡片与文案
        if: steps.gate.outputs.run == '1'
        run: python main.py

      - name: 合成播报视频（TTS 失败不阻塞）
        if: steps.gate.outputs.run == '1'
        continue-on-error: true
        run: python video.py

      - name: 推送到手机（企业微信 / Telegram）
        if: steps.gate.outputs.run == '1'
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python notify.py

      - name: 保存当日快照（供次日对比"放宽/收紧"）
        if: steps.gate.outputs.run == '1'
        run: |
          git config user.name "quota-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "snapshot $(date +%F)" || echo "no changes"
          git push

      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.run == '1'
        with:
          name: report-${{ github.run_id }}
          path: output/
          retention-days: 14
