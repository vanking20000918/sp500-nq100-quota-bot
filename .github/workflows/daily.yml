name: daily-quota-report
on:
  # 主触发：由外部可靠调度器（cron-job.org / VPS crontab 等）到点调用 GitHub API 派发
  # repository_dispatch(event_type=daily-trigger)。GitHub 的执行引擎可靠，不可靠的只是它
  # 内置的 schedule cron——把"定时"交给外部，触发延迟从几十分钟/丢弃降到几秒。
  # repository_dispatch 会走下方 gate 的交易日判断 + 远端判重（与 schedule 同路径），
  # 因此非交易日仍会自动跳过、重复触发也会被判重拦掉，安全幂等。
  repository_dispatch:
    types: [daily-trigger]
  # 兜底：万一外部调度器宕机，仍保留少量 schedule 槽位。GitHub 定时是"尽力而为"，高峰期
  # 常延迟甚至跳过，故只稀疏留几个非整点槽位（避开 :00/:30 高峰），命中其一即可，其余靠
  # 判重跳过。注意槽位不能早过 UTC 00:00，否则跨到前一个 UTC 日导致日期错位。
  schedule:
    - cron: "6 0 * * 1-5"    # 北京 08:06
    - cron: "26 0 * * 1-5"   # 北京 08:26
    - cron: "53 0 * * 1-5"   # 北京 08:53
    - cron: "23 1 * * 1-5"   # 北京 09:23
    - cron: "9 2 * * 1-5"    # 北京 10:09（最后一道兜底）
  workflow_dispatch:          # 手动触发（测试用，跳过交易日与判重检查）

permissions:
  contents: write

# 多个槽位串行执行，避免并发 push 冲突或重复推送
concurrency:
  group: daily-quota
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装中文字体与依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          pip install -r requirements.txt

      - name: 交易日检查 + 判重（已生成则跳过冗余触发）
        id: gate
        run: |
          today=$(date -u +%F)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动触发：强制执行"
            echo "run=1" >> "$GITHUB_OUTPUT"
          elif [ "$(python trading_day.py)" != "1" ]; then
            echo "非交易日，跳过"
            echo "run=0" >> "$GITHUB_OUTPUT"
          else
            # 查"远端最新 master"上今天的快照是否已存在——而非本地 checkout，
            # 因为定时任务 checkout 的是触发时刻的旧 commit，只看本地会漏判、导致重复推。
            git fetch origin "${{ github.ref_name }}" --depth=1 --quiet || true
            if git cat-file -e "origin/${{ github.ref_name }}:data/$today.json" 2>/dev/null; then
              echo "今日 $today 已生成并推送，跳过本次冗余触发"
              echo "run=0" >> "$GITHUB_OUTPUT"
            else
              echo "run=1" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: 抓取并生成卡片与文案
        if: steps.gate.outputs.run == '1'
        run: python main.py

      - name: 合成播报视频（TTS 失败不阻塞）
        if: steps.gate.outputs.run == '1'
        continue-on-error: true
        run: python video.py

      - name: 推送到手机（企业微信 / Telegram）
        if: steps.gate.outputs.run == '1'
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python notify.py

      - name: 保存当日快照（供次日对比"放宽/收紧"）
        if: steps.gate.outputs.run == '1'
        run: |
          git config user.name "quota-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "snapshot $(date +%F)" || echo "no changes"
          git push

      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.run == '1'
        with:
          name: report-${{ github.run_id }}
          path: output/
          retention-days: 14
